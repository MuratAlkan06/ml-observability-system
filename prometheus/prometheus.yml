# Prometheus scrape config for the ML Observability stack (docs/PLAN.md §6).
# Targets are resolved by Docker Compose DNS; metrics_path defaults to /metrics.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]

  - job_name: consumer
    static_configs:
      - targets: ["consumer:9108"]

  - job_name: drift
    static_configs:
      - targets: ["drift:9109"]
