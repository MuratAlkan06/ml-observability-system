# Prometheus scrape config for the ML Observability stack (docs/PLAN.md §6).
# Targets are resolved by Docker Compose DNS; metrics_path defaults to /metrics.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]

  - job_name: consumer
    static_configs:
      - targets: ["consumer:9108"]

  - job_name: drift
    static_configs:
      - targets: ["drift:9109"]

  # v1.1 (D4): shadow second-model scorer, prefix mlobs_shadow_ on :9110.
  - job_name: shadow_scorer
    static_configs:
      - targets: ["shadow-scorer:9110"]

  # v1.1 (D5): second drift job over shadow_predictions. Same metric names as
  # `drift`; the `job` label ("drift" vs "drift_shadow") separates the models.
  - job_name: drift_shadow
    static_configs:
      - targets: ["drift-shadow:9109"]
