# Grafana dashboard provider (Grafana 12.1.0; docs/PLAN.md §5-6).
# Loads every dashboard JSON mounted at /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: mlobs
    orgId: 1
    folder: ""
    type: file
    # Provisioned dashboards are read-only source of truth; block deletion via
    # the UI so a Viewer/anonymous session can't remove them (security review N2).
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
