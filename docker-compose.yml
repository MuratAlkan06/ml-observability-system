# ML Observability System — v1 stack (docs/PLAN.md §0, §7).
# Slice ownership: each implementation slice adds services ONLY under its own marker below.
# NOTE: this file is a skeleton until S1 merges; `docker compose config` is expected to fail until then.

services:

  # --- S1: api, redis ---
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Wire /health (docs/PLAN.md §2): 200 ok|degraded -> healthy, 503 -> unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- S2: postgres, consumer ---
  # NOTE: `consumer` depends on the S1-owned `redis` service, which does not
  # exist until S1 merges; `docker compose config` fails until then (see header).

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlobs
      POSTGRES_PASSWORD: mlobs
      POSTGRES_DB: mlobs
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlobs -d mlobs"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: docker/consumer.Dockerfile
    environment:
      MLOBS_REDIS_URL: redis://redis:6379/0
      MLOBS_PG_DSN: postgresql://mlobs:mlobs@postgres:5432/mlobs
      MLOBS_METRICS_PORT: "9108"
    ports:
      - "9108:9108"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # --- S3: drift ---
  drift:
    build:
      context: .
      dockerfile: docker/drift.Dockerfile
    environment:
      # Must match the postgres credentials defined by S2's marker above.
      DATABASE_URL: postgresql://mlobs:mlobs@postgres:5432/mlobs
      BASELINE_PATH: /baseline/baseline.json
      # Empty value disables alerting; evaluation + drift_runs writes continue.
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./baseline:/baseline:ro
    ports:
      - "9109:9109"
    depends_on:
      # Wait for Postgres to accept connections (matches the consumer service);
      # `service_started` alone races the DB and the first cycle logs a spurious
      # connection-refused error before the 60s retry (S5 E2E finding).
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- S4: prometheus, grafana ---

  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.0
    ports:
      - "3000:3000"
    environment:
      # Anonymous read-only access: this is a single-node demo with no auth
      # (docs/PLAN.md §0 non-goals); the login screen only gets in the way.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
