# ML Observability System — v1 stack (docs/PLAN.md §0, §7).
# Slice ownership: each implementation slice adds services ONLY under its own marker below.
# NOTE: this file is a skeleton until S1 merges; `docker compose config` is expected to fail until then.

services:

  # --- S1: api, redis ---
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Wire /health (docs/PLAN.md §2): 200 ok|degraded -> healthy, 503 -> unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- S2: postgres, consumer ---

  # --- S3: drift ---

  # --- S4: prometheus, grafana ---

  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.0
    ports:
      - "3000:3000"
    environment:
      # Anonymous read-only access: this is a single-node demo with no auth
      # (docs/PLAN.md §0 non-goals); the login screen only gets in the way.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
