# ML Observability System — v1 stack (docs/PLAN.md §0, §7).
# Slice ownership: each implementation slice adds services ONLY under its own marker below.
# NOTE: this file is a skeleton until S1 merges; `docker compose config` is expected to fail until then.

services:

  # --- S1: api, redis ---
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Wire /health (docs/PLAN.md §2): 200 ok|degraded -> healthy, 503 -> unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # v1.1 D8: cap the torch container so shadow-scorer + api + postgres/redis
    # fit the t3.medium 4GB budget with >=1GB headroom.
    mem_limit: 1536m
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- S2: postgres, consumer ---
  # NOTE: `consumer` depends on the S1-owned `redis` service, which does not
  # exist until S1 merges; `docker compose config` fails until then (see header).

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlobs
      # Secret comes from .env (never committed); `:?` fails fast if unset so a
      # weak default can't silently ship (security review M1). Applied only at
      # first initdb — rotate by recreating the volume (`down -v`).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: mlobs
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlobs -d mlobs"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: docker/consumer.Dockerfile
    environment:
      MLOBS_REDIS_URL: redis://redis:6379/0
      MLOBS_PG_DSN: postgresql://mlobs:${POSTGRES_PASSWORD}@postgres:5432/mlobs
      MLOBS_METRICS_PORT: "9108"
    # No host publish: Prometheus scrapes `consumer:9108` over the compose
    # network (security review H2). Nothing off-box needs this port.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # --- S3: drift ---
  drift:
    build:
      context: .
      dockerfile: docker/drift.Dockerfile
    environment:
      # Must match the postgres credentials defined by S2's marker above;
      # password threaded from .env (security review M1).
      DATABASE_URL: postgresql://mlobs:${POSTGRES_PASSWORD}@postgres:5432/mlobs
      BASELINE_PATH: /baseline/baseline.json
      # Empty value disables alerting; evaluation + drift_runs writes continue.
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ./baseline:/baseline:ro
    # No host publish: Prometheus scrapes `drift:9109` over the compose
    # network (security review H2). Nothing off-box needs this port.
    depends_on:
      # Wait for Postgres to accept connections (matches the consumer service);
      # `service_started` alone races the DB and the first cycle logs a spurious
      # connection-refused error before the 60s retry (S5 E2E finding).
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --- v1.1-A: shadow-scorer ---
  # Second-model comparison on live traffic. Joins mlobs:predictions with its own
  # consumer group (start id "$"), re-scores text with the candidate model, writes
  # shadow_predictions. Runs by default (demo-first); the latency A/B "off" switch
  # is `docker compose stop shadow-scorer`.
  shadow-scorer:
    build:
      context: .
      dockerfile: docker/shadow_scorer.Dockerfile
    environment:
      MLOBS_SHADOW_REDIS_URL: redis://redis:6379/0
      # Password threaded from .env, matching the consumer/drift DSNs.
      MLOBS_SHADOW_PG_DSN: postgresql://mlobs:${POSTGRES_PASSWORD}@postgres:5432/mlobs
      MLOBS_SHADOW_METRICS_PORT: "9110"
    # No host publish: Prometheus scrapes `shadow-scorer:9110` over the compose
    # network. Nothing off-box needs this port.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # v1.1 D8: only the two torch containers get a mem_limit (api 1536m above).
    mem_limit: 768m
    restart: unless-stopped

  # --- S4: prometheus, grafana ---

  prometheus:
    image: prom/prometheus:v3.5.0
    # Loopback-only publish (security review H1): reachable for local debugging
    # / SSH-tunnel on the box, never exposed on the EC2 security group. Grafana
    # queries it over the compose network, not via this host port.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.1.0
    ports:
      - "3000:3000"
    environment:
      # Anonymous read-only access: this is a single-node demo with no auth
      # (docs/PLAN.md §0 non-goals); the login screen only gets in the way.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Admin lockdown (security review B1): required password from .env (no
      # default so it can't silently ship weak), a non-`admin` login name, and
      # self-service sign-up explicitly off. Anonymous Viewer stays as above.
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-mlobsadmin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
